version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-zenith}
    volumes:
      - zenith_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenith}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zenith-net

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_APP: wsgi:app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - zenith_audio:/app/audio
    networks:
      - zenith-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_COMING_SOON: ${VITE_COMING_SOON:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - zenith-net

networks:
  zenith-net:
    driver: bridge

volumes:
  zenith_db_data:
  zenith_audio:
